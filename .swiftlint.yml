# SwiftLint — https://github.com/realm/SwiftLint
# Local: `swiftlint lint --strict`
# Pre-commit: see `.githooks/pre-commit`

included:
  - Swole
  - SwoleTests
  - SwoleUITests

excluded:
  - build
  - DerivedData
  - .build
  - .swiftpm

opt_in_rules:
  - empty_count
  - empty_string
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - todo

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 800

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - i
    - j

reporter: xcode
