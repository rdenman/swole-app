name: Swole
options:
  bundleIdPrefix: com.swole
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
targets:
  Swole:
    type: application
    platform: iOS
    sources:
      - path: Swole
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swole.app
        PRODUCT_NAME: Swole
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Swole
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_PREVIEWS: YES
    scheme:
      testTargets:
        - SwoleTests
        - SwoleUITests
  SwoleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SwoleTests
    dependencies:
      - target: Swole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swole.app.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Swole.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Swole"
        BUNDLE_LOADER: "$(TEST_HOST)"
  SwoleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SwoleUITests
    dependencies:
      - target: Swole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swole.app.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_TARGET_NAME: Swole
