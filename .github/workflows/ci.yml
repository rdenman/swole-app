name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DERIVED_DATA_PATH: build/DerivedData

jobs:
  lint:
    name: Lint & format
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Homebrew downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cache
          key: brew-lint-${{ runner.os }}-${{ hashFiles('.swiftlint.yml', '.swiftformat') }}
          restore-keys: |
            brew-lint-${{ runner.os }}-

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --strict

      - name: SwiftFormat
        # Preinstalled on macos-26 (matches local 0.62.1); brew would also work.
        run: swiftformat --lint .

  test:
    name: Build & test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      # Warm CoreSimulator so destinations are visible after xcode-select.
      - name: Refresh simulator list
        run: xcrun simctl list > /dev/null

      - name: Cache Homebrew downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cache
          key: brew-xcodegen-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            brew-xcodegen-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@v6
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: deriveddata-${{ runner.os }}-xcode26.5-${{ hashFiles('project.yml', 'Swole/**/*.swift', 'SwoleTests/**/*.swift', 'SwoleUITests/**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-xcode26.5-
            deriveddata-${{ runner.os }}-

      - name: Build and test
        run: |
          set -euo pipefail
          xcodebuild \
            -project Swole.xcodeproj \
            -scheme Swole \
            -destination 'platform=iOS Simulator,arch=arm64,name=iPhone 17' \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -resultBundlePath TestResults.xcresult \
            test \
            | xcbeautify --renderer github-actions
